# GitHub Pages Jekyll configuration
title: ABCspareparts
description: MRO industrial spare parts distributor
url: "https://abcspareparts.eu"

# Include sitemap.xml as proper XML
include:
  - sitemap.xml
  - sitemap-brands.xml
  - sitemap-index.xml

# Disable Jekyll processing on XML files
defaults:
  - scope:
      path: "sitemap.xml"
    values:
      layout: none
  - scope:
      path: "sitemap-brands.xml"
    values:
      layout: none
  - scope:
      path: "sitemap-index.xml"
    values:
      layout: none
